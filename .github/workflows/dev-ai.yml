name: Dev AI Push Handler

on:
  schedule:
    - cron: '*/2 * * * *'  # every 2 minutes
  workflow_dispatch:

jobs:
  dev-ai-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Supabase client (temporary)
        run: npm install @supabase/supabase-js --no-save

      - name: Commit and push changes
        run: |
          if [ -f .task-meta.json ]; then
            DATE=$(date +%s)
            BRANCH="feature/dev-ai-$DATE"
            git checkout -b $BRANCH
            FILE=$(jq -r '.filePath' .task-meta.json)
            MSG=$(jq -r '.message' .task-meta.json)
            if [ -f "$FILE" ]; then
              git add "$FILE"
              git commit -m "$MSG"
              git push origin $BRANCH
            else
              echo "❌ File not found: $FILE"
              exit 1
            fi
          else
            echo "⚠️ No .task-meta.json found — skipping commit."
