name: Dev AI Push Handler

on:
  workflow_dispatch:

jobs:
  dev-ai-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Supabase client (temporary)
        run: npm install @supabase/supabase-js --no-save

      - name: Commit and push changes
        run: |
          DATE=$(date +%s)
          BRANCH="feature/dev-ai-$DATE"
          git checkout -b $BRANCH
          echo "// Dev AI auto-update at $(date)" >> src/pages/index.tsx
          git add src/pages/index.tsx
          git commit -m "Dev AI auto-update"
          git push origin $BRANCH
