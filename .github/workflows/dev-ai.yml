name: Dev AI Push Handler

on:
  schedule:
    - cron: '*/2 * * * *'  # Runs every 2 minutes
  workflow_dispatch: {}

jobs:
  dev-ai-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Supabase client (temporary)
        run: npm install @supabase/supabase-js --no-save

      - name: Commit and push changes
        run: |
          if [ -f .task-meta.json ]; then
            DATE=$(date +%s)
            BRANCH=feature/dev-ai-$DATE
            git checkout -b $BRANCH
            META=$(cat .task-meta.json)
            FILE=$(echo $META | jq -r '.filePath')
            MSG=$(echo $META | jq -r '.message')
            git add $FILE
            git commit -m "$MSG"
            git push origin $BRANCH
          fi
